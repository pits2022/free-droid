# A freshly provisioned cloud host has an unknown host key by definition, and the
# Terraform-rendered inventory targets it by a just-minted public IP. Disable host-key
# checking so the provisioner (and manual `ansible-playbook -i inventory.ini`) connects
# without an interactive prompt. The edge (Pi) is a trusted LAN device; same rationale.
[defaults]
host_key_checking = False
inventory = inventory.ini
# The dedicated, passphrase-less mother key (must match the Terraform
# `ssh_public_key_path` var, default ~/.ssh/free-droid-mother.pub). Set here so both
# the Terraform local-exec and a manual `ansible-playbook -i inventory.ini` authenticate
# with it instead of falling back to a personal (passphrase-protected) id_rsa.
private_key_file = ~/.ssh/free-droid-mother
