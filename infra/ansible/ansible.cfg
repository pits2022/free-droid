# host_key_checking is off because the cloud host is DISPOSABLE: `terraform destroy`
# + re-apply mints a new host key (and Hetzner may reuse the IP), so a pinned
# known_hosts entry would only cause false mismatches. The edge Pi is different — it's
# persistent — but it's provisioned over a trusted LAN/channel per the spec, so TOFU
# adds little there either. Single-user hobby project; revisit if that changes.
[defaults]
host_key_checking = False
inventory = inventory.ini
# The dedicated, passphrase-less mother key. This is only the convenience default for
# MANUAL runs — the Terraform local-exec passes --private-key explicitly (derived from
# its ssh_public_key_path var). The matching public key must be in the target's
# authorized_keys: root@ on the cloud (Terraform injects it); when the Pi is wired up,
# add it to pi@'s authorized_keys or a manual full run falls back to the ssh-agent.
private_key_file = ~/.ssh/free-droid-mother
