---
- name: Install WireGuard
  apt:
    name: wireguard
    state: present
    update_cache: yes

- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

# Persist the key on first run only — regenerating every run would mint new keys,
# rewrite wg0.conf, and bounce the tunnel (invalidating any distributed peer keys).
- name: Generate and store the WireGuard private key (once)
  shell: "umask 077 && wg genkey > /etc/wireguard/privatekey"
  args:
    creates: /etc/wireguard/privatekey
  no_log: true   # never echo the private key into Ansible output/logs

- name: Read the stored private key
  slurp:
    src: /etc/wireguard/privatekey
  register: wg_private_key_b64
  no_log: true

- name: Derive the public key
  shell: "wg pubkey < /etc/wireguard/privatekey"
  register: wg_public_key_result
  changed_when: false
  no_log: true

- name: Set WireGuard facts
  set_fact:
    wg_private_key: "{{ wg_private_key_b64.content | b64decode | trim }}"
    wg_public_key: "{{ wg_public_key_result.stdout | trim }}"
  no_log: true   # wg_private_key is secret

- name: Check for an existing wg0.conf
  stat:
    path: /etc/wireguard/wg0.conf
  register: wg0_conf

- name: Configure WireGuard Interface
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  # Write on first provision (we need SOME conf to bring the interface up, even
  # peerless), or whenever the peer's key IS known (a full run). But NEVER overwrite
  # an existing conf with a peerless render on a later `--limit cloud` run — that
  # would strip an already-configured peer and bounce the tunnel silently.
  when: >-
    not wg0_conf.stat.exists
    or ('cloud' in group_names and (groups['edge'] | default([])) | length > 0
        and hostvars[groups['edge'][0]].wg_public_key is defined)
    or ('edge' in group_names and (groups['cloud'] | default([])) | length > 0
        and hostvars[groups['cloud'][0]].wg_public_key is defined)
  notify: Restart WireGuard

- name: Enable and start WireGuard
  systemd:
    name: wg-quick@wg0
    enabled: yes
    state: started