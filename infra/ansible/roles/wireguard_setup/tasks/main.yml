---
- name: Install WireGuard
  apt:
    name: wireguard
    state: present
    update_cache: yes

- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Generate WireGuard private key
  command: wg genkey
  register: wg_private_key_result
  changed_when: false
  no_log: true   # never echo the private key into Ansible output/logs

- name: Generate WireGuard public key
  shell: "echo '{{ wg_private_key_result.stdout }}' | wg pubkey"
  register: wg_public_key_result
  changed_when: false
  no_log: true   # the command line embeds the private key

- name: Set WireGuard facts
  set_fact:
    wg_private_key: "{{ wg_private_key_result.stdout }}"
    wg_public_key: "{{ wg_public_key_result.stdout }}"
  no_log: true   # wg_private_key is secret

- name: Configure WireGuard Interface
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  notify: Restart WireGuard

- name: Enable and start WireGuard
  systemd:
    name: wg-quick@wg0
    enabled: yes
    state: started