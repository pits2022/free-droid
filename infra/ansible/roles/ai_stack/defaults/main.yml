---
# Base model pulled into Ollama on each node (bring-up placeholder).
#
# Model decision (concluded on the Hungarian persona benchmark, not generic scores):
# an ASYMMETRIC hybrid — the cloud runs Llama 3.1 8B, the edge runs Llama 3.2 3B.
# 3B Hungarian/persona was the weak link; the 8B lifts it, but at ~4-5 tok/s on CPU
# it is CLOUD-ONLY (the Pi can't run it in real time). Both stay one-line swaps.
#
# NOTE: ultimately the *fine-tuned* GGUF is loaded via an Ollama Modelfile rather
# than pulled from the registry; these registry tags are the bring-up placeholder.
cloud_ollama_model: "llama3.1:8b"   # cloud CAX31/41 (ARM, CPU) — inference only, 8B
edge_ollama_model: "llama3.2:3b"    # RPi 5 — offline fallback (Q4_K_M), 3B
