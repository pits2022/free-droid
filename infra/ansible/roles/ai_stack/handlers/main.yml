---
# Defined in run order: a daemon-reload must precede any restart that depends on
# an edited unit file (flush_handlers runs handlers in definition order).
- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Restart Docker
  systemd:
    name: docker
    state: restarted

- name: Restart Ollama
  systemd:
    name: ollama
    state: restarted
    daemon_reload: yes
