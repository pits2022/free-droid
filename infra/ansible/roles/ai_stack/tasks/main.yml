---
- name: Install curl
  apt:
    name: curl
    state: present

- name: Setup Cloud Node (Ollama via Docker)
  block:
    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Setup NVIDIA Container Toolkit repository
      shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install NVIDIA Container Toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes

    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

    - name: Check if Ollama container exists
      command: docker ps -a -q -f name=ollama
      register: ollama_container
      changed_when: false

    # OLLAMA_HOST=0.0.0.0 is the *in-container* bind; the host publish is pinned
    # to the WireGuard IP ({{ vpn_ip }}), so the API is reachable only over the
    # VPN (the edge calls it at {{ vpn_ip }}:11434), never on the public NIC.
    - name: Run Ollama Container
      command: docker run -d --gpus=all -v ollama:/root/.ollama -p {{ vpn_ip }}:11434:11434 --name ollama --restart always -e OLLAMA_HOST="0.0.0.0" ollama/ollama
      when: ollama_container.stdout == ""

    - name: Pull base model into Ollama (cloud)
      command: docker exec ollama ollama pull {{ cloud_ollama_model }}
  when: "'cloud' in group_names"

- name: Setup Edge Node (Ollama Native)
  block:
    - name: Install Ollama natively
      shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    # Edge Ollama is only ever called by the local orchestrator (offline
    # fallback) — bind to loopback so it is never reachable over LTE/Wi-Fi/VPN.
    - name: Bind edge Ollama to loopback only
      lineinfile:
        path: /etc/systemd/system/ollama.service
        regexp: '^Environment="OLLAMA_HOST='
        insertafter: '^\[Service\]'
        line: 'Environment="OLLAMA_HOST=127.0.0.1"'
      notify: Restart Ollama

    - name: Pull base model into Ollama (edge)
      command: ollama pull {{ edge_ollama_model }}
  when: "'edge' in group_names"