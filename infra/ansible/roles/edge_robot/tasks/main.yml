---
# Edge (RPi 5) robot runtime — Raspberry Pi OS / Debian Bookworm.
# Plain Python control stack (no ROS 2, per the v2.0 spec), managed with uv.

- name: Install system prerequisites
  apt:
    name:
      - git
      - curl
      - python3
      - python3-dev
      - build-essential   # native builds (e.g. lgpio)
    state: present
    update_cache: yes

# uv is not packaged in Debian; use the official installer. (Same accepted
# curl|installer pattern as Docker/Ollama — pin/verify as a later hardening step.)
- name: Install uv (Astral) for the pi user
  become: false
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"

- name: Clone the free-droid repo
  when: robot_repo_url | length > 0
  git:
    repo: "{{ robot_repo_url }}"
    version: "{{ robot_repo_version }}"
    dest: "{{ robot_src_dir | dirname }}"

# uv reads pyproject.toml in robot_src_dir and creates the project venv there.
- name: Sync the robot project venv with uv
  become: false
  command: >-
    {{ ansible_env.HOME }}/.local/bin/uv sync
    {{ '--extra voice' if robot_install_voice_extra else '' }}
  args:
    chdir: "{{ robot_src_dir }}"
