---
# Edge (RPi 5) robot runtime — Raspberry Pi OS / Debian Bookworm.
# Plain Python control stack (no ROS 2, per the v2.0 spec).

- name: Install Python build prerequisites
  apt:
    name:
      - python3-pip
      - python3-venv
      - python3-dev
    state: present
    update_cache: yes

- name: Create Python virtual environment for the robot logic
  pip:
    name: "{{ robot_python_deps }}"
    virtualenv: "{{ robot_venv }}"
    virtualenv_command: python3 -m venv
