---
# The unprivileged user that owns and runs the robot software on the Pi
# (matches the inventory's ansible_user for the edge host).
robot_user: pi
robot_user_home: "/home/{{ robot_user }}"

# Where the repo's robot/ project lives on the Pi. The orchestrator runs from here.
robot_src_dir: /opt/free-droid/robot

# Optional: clone the repo to {{ robot_src_dir | dirname }} if set. Leave empty to
# deliver the code another way (rsync, image bake, manual git).
robot_repo_url: ""
robot_repo_version: main

# Install the offline voice stack extra (openWakeWord, Piper). whisper.cpp is a
# native binary wired up separately. Off by default until Phase 4.2.
robot_install_voice_extra: false

# Health-check (freedroid-health) systemd service + timer.
robot_venv_bin: "{{ robot_src_dir }}/.venv/bin"
health_check_on_boot_sec: 60     # first run ~1 min after boot
health_check_interval_sec: 600   # then every 10 min
